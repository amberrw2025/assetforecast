{% extends "base.html" %}

{% block title %}Asset Forecaster{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-8 col-lg-6">
            <div class="text-center">
                <!-- Main Question -->
                <h1 class="display-4 fw-bold mb-4 text-dark">
                    Which asset do you want me to forecast?
                </h1>
                
                <!-- Input Form -->
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <form id="forecastForm">
                            <div class="mb-4">
                                <input type="text" 
                                       class="form-control form-control-lg text-center" 
                                       id="assetInput" 
                                       placeholder="Enter stock ticker (e.g., AAPL, TSLA, NVDA)"
                                       style="font-size: 1.5rem; padding: 20px;">
                            </div>
                            
                            <div class="mb-4">
                                <label for="forecastDays" class="form-label text-dark">Forecast Period</label>
                                <select class="form-select form-select-lg" id="forecastDays">
                                    <option value="7">7 days</option>
                                    <option value="14">14 days</option>
                                    <option value="30" selected>30 days</option>
                                    <option value="60">60 days</option>
                                    <option value="90">90 days</option>
                                </select>
                            </div>
                            
                            <button type="submit" 
                                    class="btn btn-dark btn-lg px-5 py-3" 
                                    id="forecastBtn">
                                <i class="fas fa-crystal-ball me-2"></i>
                                Generate Forecast
                            </button>
                        </form>
                    </div>
                </div>
                
                <!-- Results Section -->
                <div id="resultsSection" class="mt-5" style="display: none;">
                    <div class="card shadow border-0">
                        <div class="card-header bg-dark text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-chart-line me-2"></i>
                                Forecast Results for <span id="tickerName"></span>
                            </h5>
                        </div>
                        <div class="card-body">
                            <!-- Loading indicator -->
                            <div id="loadingIndicator" class="text-center py-5">
                                <div class="spinner-border text-dark" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-3 text-dark">Generating forecast...</p>
                            </div>
                            
                            <!-- Chart container -->
                            <div id="forecastChart" style="height: 500px;"></div>
                            
                            <!-- Forecast Summary -->
                            <div id="forecastSummary" class="row mt-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #ffffff;
        min-height: 100vh;
        color: #000000;
    }
    
    .card {
        background: #ffffff;
        border: 2px solid #000000 !important;
    }
    
    .form-control {
        border: 2px solid #000000;
        background-color: #ffffff;
        color: #000000;
    }
    
    .form-control:focus {
        border-color: #000000;
        box-shadow: 0 0 0 0.2rem rgba(0, 0, 0, 0.25);
        background-color: #ffffff;
        color: #000000;
    }
    
    .form-select {
        border: 2px solid #000000;
        background-color: #ffffff;
        color: #000000;
    }
    
    .form-select:focus {
        border-color: #000000;
        box-shadow: 0 0 0 0.2rem rgba(0, 0, 0, 0.25);
        background-color: #ffffff;
        color: #000000;
    }
    
    .btn-dark {
        background-color: #000000;
        border: 2px solid #000000;
        color: #ffffff;
        border-radius: 0;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
    }
    
    .btn-dark:hover {
        background-color: #ffffff;
        color: #000000;
        border: 2px solid #000000;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }
    
    .text-dark {
        color: #000000 !important;
    }
    
    .bg-dark {
        background-color: #000000 !important;
    }
    
    .card-header {
        border-bottom: 2px solid #000000;
    }
    
    .spinner-border {
        border-color: #000000;
        border-right-color: transparent;
    }
    
    .form-label {
        font-weight: 600;
        color: #000000;
    }
    
    .shadow-lg {
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.3) !important;
    }
    
    .shadow {
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.3) !important;
    }
    
    h1 {
        font-weight: 700;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('forecastForm');
    const assetInput = document.getElementById('assetInput');
    const forecastBtn = document.getElementById('forecastBtn');
    const resultsSection = document.getElementById('resultsSection');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const forecastChart = document.getElementById('forecastChart');
    const tickerName = document.getElementById('tickerName');
    const forecastSummary = document.getElementById('forecastSummary');
    
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const ticker = assetInput.value.trim().toUpperCase();
        const days = document.getElementById('forecastDays').value;
        
        if (!ticker) {
            alert('Please enter a stock ticker symbol');
            return;
        }
        
        generateAssetForecast(ticker, days);
    });
    
    function generateAssetForecast(ticker, days) {
        // Show results section and loading
        resultsSection.style.display = 'block';
        loadingIndicator.style.display = 'block';
        forecastChart.style.display = 'none';
        tickerName.textContent = ticker;
        
        // Disable form
        forecastBtn.disabled = true;
        forecastBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Generating...';
        
        // Scroll to results
        resultsSection.scrollIntoView({ behavior: 'smooth' });
        
        // Make API call
        fetch('/api/forecast-asset', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                ticker: ticker,
                days: parseInt(days)
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                displayForecastResults(data);
            } else {
                throw new Error(data.error || 'Failed to generate forecast');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error generating forecast: ' + error.message);
        })
        .finally(() => {
            // Re-enable form
            forecastBtn.disabled = false;
            forecastBtn.innerHTML = '<i class="fas fa-crystal-ball me-2"></i>Generate Forecast';
            loadingIndicator.style.display = 'none';
        });
    }
    
    function displayForecastResults(data) {
        // Hide loading, show chart
        loadingIndicator.style.display = 'none';
        forecastChart.style.display = 'block';
        
        // Create traces - only show historical and combined forecast
        const traces = [];
        
        // Historical data trace
        traces.push({
            x: data.historical_dates,
            y: data.historical_prices,
            type: 'scatter',
            mode: 'lines',
            name: 'Historical Price',
            line: { color: '#2563eb', width: 3 }
        });
        
        // Add only the primary forecast (ensemble/combined) line
        traces.push({
            x: data.forecast_dates,
            y: data.primary_forecast,
            type: 'scatter',
            mode: 'lines',
            name: `Forecast (${data.ensemble_info.models_used} models combined)`,
            line: { 
                color: '#dc2626', 
                width: 4
            }
        });
        
        const layout = {
            title: {
                text: `${data.ticker} Combined Forecast (${data.ensemble_info.models_used} Models)`,
                font: { size: 20, color: '#000000' }
            },
            xaxis: { 
                title: 'Date',
                titlefont: { color: '#000000' },
                tickfont: { color: '#000000' }
            },
            yaxis: { 
                title: 'Price ($)',
                titlefont: { color: '#000000' },
                tickfont: { color: '#000000' }
            },
            showlegend: true,
            legend: {
                font: { color: '#000000' },
                x: 0,
                y: 1
            },
            paper_bgcolor: '#ffffff',
            plot_bgcolor: '#ffffff',
            margin: { t: 50, b: 50, l: 50, r: 50 }
        };
        
        Plotly.newPlot('forecastChart', traces, layout, {responsive: true});
        
        // Display enhanced summary with model information
        let modelsUsedInfo = '';
        Object.entries(data.model_info).forEach(([modelName, info]) => {
            const statusIcon = info.status === 'success' ? '✅' : '❌';
            const statusClass = info.status === 'success' ? 'text-success' : 'text-danger';
            modelsUsedInfo += `
                <div class="mb-2">
                    <strong>${statusIcon} ${modelName}:</strong> 
                    <span class="${statusClass}">${info.status === 'success' ? info.type : info.error}</span>
                </div>
            `;
        });
        
        const summaryHTML = `
            <div class="col-md-3">
                <div class="text-center p-3 border border-2 border-dark rounded">
                    <h6 class="text-dark">Current Price</h6>
                    <h4 class="text-dark">$${data.current_price.toFixed(2)}</h4>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center p-3 border border-2 border-dark rounded">
                    <h6 class="text-dark">Predicted Price</h6>
                    <h4 class="text-dark">$${data.predicted_price.toFixed(2)}</h4>
                    <small class="text-muted">(${data.ensemble_info.primary_model})</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center p-3 border border-2 border-dark rounded">
                    <h6 class="text-dark">Expected Change</h6>
                    <h4 class="text-dark">
                        ${data.change_percent >= 0 ? '+' : ''}${data.change_percent.toFixed(2)}%
                    </h4>
                </div>
            </div>
            <div class="col-md-3">
                <div class="text-center p-3 border border-2 border-dark rounded">
                    <h6 class="text-dark">Models Used</h6>
                    <h4 class="text-dark">${data.ensemble_info.models_used}</h4>
                    <small class="text-muted">Active Models</small>
                </div>
            </div>
            <div class="col-12 mt-3">
                <div class="p-3 border border-2 border-dark rounded">
                    <h6 class="text-dark mb-3">Model Performance:</h6>
                    ${modelsUsedInfo}
                    <div class="mt-3">
                        <small class="text-muted">
                            <strong>Confidence Interval:</strong> ±$${data.confidence_interval.toFixed(2)} 
                            (95% confidence level)
                        </small>
                    </div>
                </div>
            </div>
        `;
        
        forecastSummary.innerHTML = summaryHTML;
    }
    
    // Auto-focus on input
    assetInput.focus();
    
    // Handle Enter key
    assetInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            form.dispatchEvent(new Event('submit'));
        }
    });
});
</script>
{% endblock %}
