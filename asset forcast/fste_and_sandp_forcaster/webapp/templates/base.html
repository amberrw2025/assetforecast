<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Forecast Accuracy Assessment{% endblock %}</title>
    
    <!-- Bootstrap CSS (from both, kept latest version) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (from Amber) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Plotly.js (from Amber) - essential for complex charts -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <!-- Chart.js (from both) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Global Black and White Theme */
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        /* Navigation */
        .navbar {
            background-color: #000000 !important;
            border: none;
        }
        
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
            color: #ffffff !important;
        }
        
        .nav-link {
            color: #ffffff !important;
        }
        
        .nav-link:hover {
            color: #cccccc !important;
        }
        
        /* Cards */
        .card {
            border: 2px solid #000000;
            background-color: #ffffff;
            color: #000000;
        }
        
        .card-header {
            background-color: #000000 !important;
            color: #ffffff !important;
            border-bottom: 2px solid #000000;
        }
        
        /* Buttons - All black and white */
        .btn-primary, .btn-success, .btn-warning, .btn-info, .btn-danger {
            background-color: #000000 !important;
            border: 2px solid #000000 !important;
            color: #ffffff !important;
        }
        
        .btn-primary:hover, .btn-success:hover, .btn-warning:hover, .btn-info:hover, .btn-danger:hover {
            background-color: #ffffff !important;
            color: #000000 !important;
            border: 2px solid #000000 !important;
        }
        
        .btn-outline-primary, .btn-outline-success, .btn-outline-warning, .btn-outline-info, .btn-outline-danger {
            background-color: #ffffff !important;
            border: 2px solid #000000 !important;
            color: #000000 !important;
        }
        
        .btn-outline-primary:hover, .btn-outline-success:hover, .btn-outline-warning:hover, .btn-outline-info:hover, .btn-outline-danger:hover {
            background-color: #000000 !important;
            color: #ffffff !important;
            border: 2px solid #000000 !important;
        }
        
        .btn-secondary {
            background-color: #666666 !important;
            border: 2px solid #666666 !important;
            color: #ffffff !important;
        }
        
        .btn-secondary:hover {
            background-color: #ffffff !important;
            color: #666666 !important;
            border: 2px solid #666666 !important;
        }
        
        /* Forms */
        .form-control, .form-select {
            border: 2px solid #000000 !important;
            background-color: #ffffff !important;
            color: #000000 !important;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #000000 !important;
            box-shadow: 0 0 0 0.2rem rgba(0, 0, 0, 0.25) !important;
            background-color: #ffffff !important;
            color: #000000 !important;
        }
        
        /* Alerts */
        .alert {
            border: 2px solid #000000 !important;
        }
        
        .alert-info {
            background-color: #f8f9fa !important;
            color: #000000 !important;
        }
        
        .alert-success {
            background-color: #f8f9fa !important;
            color: #000000 !important;
        }
        
        .alert-warning {
            background-color: #f8f9fa !important;
            color: #000000 !important;
        }
        
        .alert-danger {
            background-color: #f8f9fa !important;
            color: #000000 !important;
        }
        
        /* Badges */
        .badge {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
        
        .badge.bg-success, .badge.bg-primary, .badge.bg-warning, .badge.bg-danger, .badge.bg-info {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
        
        /* Tables */
        .table {
            color: #000000;
        }
        
        .table thead th {
            background-color: #000000 !important;
            color: #ffffff !important;
            border: 2px solid #000000;
        }
        
        .table-dark {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
        
        .table-striped tbody tr:nth-of-type(odd) {
            background-color: #f8f9fa;
        }
        
        /* Text colors - override Bootstrap colors */
        .text-primary, .text-success, .text-warning, .text-danger, .text-info {
            color: #000000 !important;
        }
        
        .text-muted {
            color: #666666 !important;
        }
        
        /* Background colors - override Bootstrap colors */
        .bg-primary, .bg-success, .bg-warning, .bg-danger, .bg-info {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
        
        .bg-light {
            background-color: #f8f9fa !important;
            color: #000000 !important;
        }
        
        .bg-dark {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
        
        /* Spinners */
        .spinner-border {
            border-color: #000000;
            border-right-color: transparent;
        }
        
        /* Footer */
        .footer {
            background-color: #000000 !important;
            color: #ffffff !important;
            padding: 20px 0;
            margin-top: 50px;
        }
        
        /* Borders */
        .border-primary, .border-success, .border-warning, .border-danger, .border-info {
            border-color: #000000 !important;
        }
        
        /* Progress bars */
        .progress {
            background-color: #f8f9fa;
        }
        
        .progress-bar {
            background-color: #000000 !important;
        }
        
        /* Stats cards */
        .stats-card {
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #000000;
        }
        
        .stats-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stats-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        /* Chart containers - keep colorful */
        .chart-container {
            position: relative;
            height: 400px;
            margin: 20px 0;
            /* Charts inside will retain their colors */
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('index') }}">Asset Forecaster</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('index') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('stocks') }}">Stocks</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('commodities') }}">Commodities</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('upload_page') }}">Upload Data</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('forecast_plots') }}">Forecast Plots</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('comprehensive_plots') }}">Comprehensive Plots</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <p>&copy; 2024 Asset Forecaster. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper (kept latest version from 'new') -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery (from new) - often used with Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <!-- Custom JavaScript (from new) -->
    <script>
        // Global variables
        let currentData = null;
        let currentForecasts = null;

        // Upload functionality
        function showUploadModal() {
            const modal = new bootstrap.Modal(document.getElementById('uploadModal'));
            modal.show();
        }

        // File upload handling
        document.getElementById('fileInput')?.addEventListener('change', handleFileSelect); // Use optional chaining for robustness
        
        const uploadArea = document.getElementById('uploadArea');
        
        if (uploadArea) { // Ensure uploadArea exists before adding listeners
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        function handleFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            // Show progress
            const uploadProgressDiv = document.getElementById('uploadProgress');
            const progressBar = document.querySelector('.progress-bar'); // This should be inside uploadProgressDiv usually
            
            if (uploadProgressDiv) uploadProgressDiv.style.display = 'block';
            if (progressBar) progressBar.style.width = '0%'; // Reset progress bar

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                // Manually handle progress if needed, but fetch doesn't expose it directly for simple body
                if (response.ok) {
                    if (progressBar) progressBar.style.width = '100%'; // Simulate completion
                    return response.json();
                } else {
                    return response.json().then(errorData => {
                        throw new Error(errorData.error || `Server responded with status ${response.status}`);
                    });
                }
            })
            .then(data => {
                if (data.success) {
                    showAlert('success', 'File uploaded successfully!');
                    currentData = data.summary; // Assuming `data.summary` exists after a successful upload
                    updateDashboard(); // Call to update dashboard with new data
                    const uploadModalInstance = bootstrap.Modal.getInstance(document.getElementById('uploadModal'));
                    if (uploadModalInstance) {
                        uploadModalInstance.hide();
                    }
                } else {
                    // This block might not be reached if an error is thrown in the .then(response => ...)
                    showAlert('danger', data.error || 'Upload failed');
                }
            })
            .catch(error => {
                showAlert('danger', 'Error uploading file: ' + error.message);
            })
            .finally(() => {
                if (uploadProgressDiv) uploadProgressDiv.style.display = 'none';
            });
        }

        // Alert system
        function showAlert(type, message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            
            const container = document.querySelector('.container');
            if (container) { // Ensure container exists
                container.insertBefore(alertDiv, container.firstChild);
            }
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
